name: UAV Platform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Flake8 Style Linting
      run: |
        pip install flake8
        flake8 backend/apps/ backend/config/ --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Run Django System Checks
      run: |
        cd backend
        python manage.py check --settings=config.settings.local

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install Node dependencies
      run: |
        cd frontend
        npm install
        
    - name: Vite Build Test
      run: |
        cd frontend
        npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Backend Docker Image
      run: |
        docker build -t uav-backend-local:test -f backend/Dockerfile backend/
